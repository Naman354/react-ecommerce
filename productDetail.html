<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav>
        <a href="index.html">Home</a>
        <a href="cart.html" class="cart-link">Cart</a>
    </nav>
    <h1>Product Detail</h1>
    <main>
    </main>
    <div id="message-box" class="message-box"></div>
    <script src="cart.js"></script>
    <script>
        let urlData = new URLSearchParams(window.location.search);
        let id = urlData.get("id");

        async function productFetch(){
            if (!id) {
                document.body.innerHTML = '<h1>Product not found</h1><p>No product ID was provided.</p>';
                return;
            }

            let url = `https://dummyjson.com/products/${id}`;
            let pFetch = await fetch(url);
            let pdata = await pFetch.json();

            let card = document.createElement("div");
            card.classList.add("product-detail-card");

            let title = document.createElement("h2");
            title.innerText = pdata.title;

            let image = document.createElement("img");
            image.src = pdata.thumbnail;
            image.alt = pdata.title;
            image.classList.add("product-detail-image");

            let description = document.createElement("p");
            description.innerText = pdata.description;

            let price = document.createElement("p");
            price.innerText = `Price: Rs ${Math.ceil(pdata.price * 95)}/-`;
            price.classList.add("product-price");

            let rating = document.createElement("p");
            rating.innerText = `Rating: ${pdata.rating}`;

            let category = document.createElement("p");
            category.innerText = `Category: ${pdata.category}`;

            let addToCart = document.createElement("button");
            addToCart.innerText = "Add to Cart";
            addToCart.classList.add("add-to-cart-button");
            addToCart.dataset.productId = pdata.id;
            addToCart.dataset.productTitle = pdata.title;
            addToCart.dataset.productPrice = Math.ceil(pdata.price * 95);
            addToCart.dataset.productThumbnail = pdata.thumbnail;

            card.append(title, image, description, price, rating, category, addToCart);
            document.querySelector("main").append(card);
        }

        productFetch();
    </script>
</body>
</html>
